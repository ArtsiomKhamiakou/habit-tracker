<!DOCTYPE html>
<html>
<head>
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0;">🏆 Habit Tracker</h1>
            <button id="theme-toggle" style="
                background: white;
                border: none;
                font-size: 1.5rem;
                cursor: pointer;
                padding: 0.5rem 1rem;
                border-radius: 8px;
                transition: all 0.3s;
            ">🌙</button>
        </div>
        
        <button id="open-modal-btn" style="
            width: 100%;
            padding: 1rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        ">➕ Новая привычка</button>
        
        <!-- Блок статистики -->
        <div id="stats-container" style="margin-bottom: 2rem;"></div>
        
        <!-- ПОЛЕ ПОИСКА -->
        <input type="text" id="search-input" placeholder="🔍 Поиск привычек..." style="
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        ">
        
        <button id="clear-all-btn" style="
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        " onmouseover="this.style.background='#dc2626'" onmouseout="this.style.background='#ef4444'">
            🗑️ Очистить все привычки
        </button>
        
        <h2>Мои привычки</h2>
        <div id="habits-list">
            <p>Загрузка...</p>
        </div>
        
        <div id="pagination" style="margin-top: 2rem; text-align: center;"></div>
    </div>
    
    <!-- Модальное окно -->
    <div id="habit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Добавить привычку</h2>
            <form id="habit-form">
                <input type="text" id="habit-name" placeholder="Название привычки" required>
                <textarea id="habit-description" placeholder="Описание (необязательно)"></textarea>
                <select id="habit-category">
                    <option value="general">Общая</option>
                    <option value="health">Здоровье</option>
                    <option value="work">Работа</option>
                    <option value="learning">Обучение</option>
                </select>
                <button type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
